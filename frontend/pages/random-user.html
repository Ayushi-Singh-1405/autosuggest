<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random User - Auto Suggest</title>
    <link rel="stylesheet" href="../css/index.css">
    <style>
        .btn {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            background-color: #361319;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #6D3A3C;
        }
        .card img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/">Home</a>
        <a href="/pages/card.html">Card</a>
        <a href="/pages/toggle.html">Toggle</a>
        <a href="/pages/random-user.html">Random User</a>
    </div>

    <div class="container">
        <div class="card" id="user-card">
            <img id="user-img" src="" alt="User Image">
            <h2 id="user-name"></h2>
            <p id="user-gender"></p>
            <button class="btn" onclick="fetchRandomUser()">New User</button>
        </div>
    </div>

    <script>
        async function fetchRandomUser() {
            const res = await fetch("https://randomuser.me/api/");
            const data = await res.json();
            const user = data.results[0];

            document.getElementById("user-img").src = user.picture.large;
            document.getElementById("user-name").textContent = `${user.name.first} ${user.name.last}`;
            document.getElementById("user-gender").textContent = user.gender;
        }

        fetchRandomUser();
    </script>
</body>
</html>
